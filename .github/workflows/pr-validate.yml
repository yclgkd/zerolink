name: PR Validate

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "_project_specs/**"
      - ".ai/**"
      - ".agents/**"
      - ".claude/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/e2e-full.yml"
      - ".github/workflows/pr-checklist.yml"
      - ".husky/**"
      - "biome.json"
      - "commitlint.config.js"
      - ".gitignore"
      - ".env.example"
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-quality:
    name: PR Quality
    if: github.event_name == 'merge_group' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 9.12.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Build frontend
        env:
          VITE_RELEASE_VERIFICATION_REQUIRED: "true"
        run: pnpm --filter @zerolink/frontend build

  selfhost-store:
    name: Self-Hosted Store
    if: github.event_name == 'merge_group' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zerolink_selfhost
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zerolink_selfhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/selfhost-api/go.mod
          cache-dependency-path: services/selfhost-api/go.sum

      - name: Run self-hosted store tests
        working-directory: services/selfhost-api
        env:
          SELFHOST_API_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/zerolink_selfhost?sslmode=disable
        run: go test ./...
