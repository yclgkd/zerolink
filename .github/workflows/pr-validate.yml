name: PR Validate

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronize, reopened, ready_for_review]
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/e2e-full.yml"
      - ".github/workflows/pr-checklist.yml"
      - ".gitignore"
      - ".env.example"
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    if: github.event_name == 'merge_group' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_node: ${{ steps.filter.outputs.run_node }}
      run_go: ${{ steps.filter.outputs.run_go }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Determine changed areas
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run_node=true" >> "$GITHUB_OUTPUT"
            echo "run_go=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          run_node=false
          run_go=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            if [ "$file" = ".github/workflows/pr-validate.yml" ]; then
              run_node=true
              run_go=true
              continue
            fi

            if [[ "$file" == services/selfhost-api/* ]]; then
              case "$file" in
                *.md|services/selfhost-api/.env.example)
                  ;;
                *)
                  run_go=true
                  ;;
              esac
            fi

            if [[ "$file" != */* && "$file" == *.md ]]; then
              run_node=true
              continue
            fi

            case "$file" in
              packages/*|protocol-fixtures/*|scripts/*|docs/*|docs/**|.husky/*|.husky/**|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig*.json|vitest.config.ts|biome.json|commitlint.config.js)
                run_node=true
                ;;
            esac
          done < <(git diff --name-only "$base_sha" "$head_sha")

          echo "run_node=$run_node" >> "$GITHUB_OUTPUT"
          echo "run_go=$run_go" >> "$GITHUB_OUTPUT"

  pr-quality:
    name: PR Quality
    needs: changes
    if: (github.event_name == 'merge_group' || !github.event.pull_request.draft) && needs.changes.outputs.run_node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 9.12.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Build frontend
        env:
          VITE_RELEASE_VERIFICATION_REQUIRED: "true"
        run: pnpm --filter @zerolink/frontend build

  selfhost-store:
    name: Self-Hosted Store
    needs: changes
    if: (github.event_name == 'merge_group' || !github.event.pull_request.draft) && needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zerolink_selfhost
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zerolink_selfhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/selfhost-api/go.mod
          cache-dependency-path: services/selfhost-api/go.sum

      - name: Check Go formatting
        working-directory: services/selfhost-api
        shell: bash
        run: |
          unformatted="$(find . -name '*.go' -print0 | xargs -0 gofmt -l)"
          if [ -n "$unformatted" ]; then
            echo "These Go files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run self-hosted store tests
        working-directory: services/selfhost-api
        env:
          SELFHOST_API_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/zerolink_selfhost?sslmode=disable
        run: go test -p 1 ./...
