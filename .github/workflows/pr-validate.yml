name: PR Validate

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-quality:
    name: PR Quality
    if: github.event_name == 'merge_group' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COREPACK_HOME: /tmp/corepack
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Resolve pnpm via Corepack
        run: |
          mkdir -p "$COREPACK_HOME"
          mkdir -p /tmp/corepack-bin
          corepack enable --install-directory /tmp/corepack-bin
          echo "/tmp/corepack-bin" >> "$GITHUB_PATH"
          export PATH="/tmp/corepack-bin:$PATH"
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  pr-build:
    name: PR Build
    if: github.event_name == 'merge_group' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COREPACK_HOME: /tmp/corepack
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Resolve pnpm via Corepack
        run: |
          mkdir -p "$COREPACK_HOME"
          mkdir -p /tmp/corepack-bin
          corepack enable --install-directory /tmp/corepack-bin
          echo "/tmp/corepack-bin" >> "$GITHUB_PATH"
          export PATH="/tmp/corepack-bin:$PATH"
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_RELEASE_VERIFICATION_REQUIRED: "true"
        run: pnpm --filter @zerolink/frontend build

  pr-e2e:
    name: PR E2E
    if: github.event_name == 'merge_group' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COREPACK_HOME: /tmp/corepack
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Resolve pnpm via Corepack
        run: |
          mkdir -p "$COREPACK_HOME"
          mkdir -p /tmp/corepack-bin
          corepack enable --install-directory /tmp/corepack-bin
          echo "/tmp/corepack-bin" >> "$GITHUB_PATH"
          export PATH="/tmp/corepack-bin:$PATH"
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: packages/frontend

      - name: Run E2E tests
        run: pnpm --filter @zerolink/frontend test:e2e
