name: deploy

on:
  push:
    branches:
      - main        # → staging
    tags:
      - "v*"        # → production
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "_project_specs/**"
      - ".ai/**"
      - ".agents/**"
      - ".claude/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/pr-checklist.yml"
      - ".github/workflows/pr-validate.yml"
      - ".husky/**"
      - "scripts/__tests__/**"
      - "biome.json"
      - "commitlint.config.js"
      - "vitest.config.ts"
      - ".gitignore"
      - ".env.example"

jobs:
  test-typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COREPACK_HOME: /tmp/corepack

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Resolve pnpm via Corepack
        run: |
          mkdir -p "$COREPACK_HOME"
          mkdir -p /tmp/corepack-bin
          corepack enable --install-directory /tmp/corepack-bin
          echo "/tmp/corepack-bin" >> "$GITHUB_PATH"
          export PATH="/tmp/corepack-bin:$PATH"
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COREPACK_HOME: /tmp/corepack

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Resolve pnpm via Corepack
        run: |
          mkdir -p "$COREPACK_HOME"
          mkdir -p /tmp/corepack-bin
          corepack enable --install-directory /tmp/corepack-bin
          echo "/tmp/corepack-bin" >> "$GITHUB_PATH"
          export PATH="/tmp/corepack-bin:$PATH"
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COREPACK_HOME: /tmp/corepack

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Resolve pnpm via Corepack
        run: |
          mkdir -p "$COREPACK_HOME"
          mkdir -p /tmp/corepack-bin
          corepack enable --install-directory /tmp/corepack-bin
          echo "/tmp/corepack-bin" >> "$GITHUB_PATH"
          export PATH="/tmp/corepack-bin:$PATH"
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: packages/frontend

      - name: Run E2E tests
        run: pnpm --filter frontend test:e2e

  deploy-backend:
    name: Deploy Worker (${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }})
    needs: [test-typecheck, test-unit, test-e2e]
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }}
    permissions:
      contents: read
    env:
      COREPACK_HOME: /tmp/corepack

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Resolve pnpm via Corepack
        run: |
          mkdir -p "$COREPACK_HOME"
          mkdir -p /tmp/corepack-bin
          corepack enable --install-directory /tmp/corepack-bin
          echo "/tmp/corepack-bin" >> "$GITHUB_PATH"
          export PATH="/tmp/corepack-bin:$PATH"
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Worker (production)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: packages/backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Deploy Worker (staging)
        if: "!startsWith(github.ref, 'refs/tags/')"
        working-directory: packages/backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env staging

  deploy-frontend:
    name: Deploy Pages (${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }})
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }}
    permissions:
      contents: read
    env:
      COREPACK_HOME: /tmp/corepack

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Resolve pnpm via Corepack
        run: |
          mkdir -p "$COREPACK_HOME"
          mkdir -p /tmp/corepack-bin
          corepack enable --install-directory /tmp/corepack-bin
          echo "/tmp/corepack-bin" >> "$GITHUB_PATH"
          export PATH="/tmp/corepack-bin:$PATH"
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_RELEASE_VERIFICATION_REQUIRED: "true"
        run: pnpm --filter frontend build

      - name: Generate manifest
        run: pnpm manifest:generate

      - name: Sign manifest
        env:
          MANIFEST_SIGNING_KEY: ${{ secrets.MANIFEST_SIGNING_KEY }}
        run: pnpm manifest:sign

      - name: Verify manifest
        run: pnpm manifest:verify

      - name: Deploy to Pages (production)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy packages/frontend/dist \
            --project-name zerolink \
            --branch main

      - name: Deploy to Pages (staging)
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy packages/frontend/dist \
            --project-name zerolink \
            --branch staging
