name: deploy

on:
  push:
    branches:
      - main        # → staging
    tags:
      - "v*"        # → production
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "_project_specs/**"
      - ".ai/**"
      - ".agents/**"
      - ".claude/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/pr-checklist.yml"
      - ".github/workflows/pr-validate.yml"
      - ".husky/**"
      - "scripts/__tests__/**"
      - "biome.json"
      - "commitlint.config.js"
      - "vitest.config.ts"
      - ".gitignore"
      - ".env.example"
      - "version.txt"

jobs:
  deploy:
    name: Deploy (${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }})
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 9.12.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            SHORT_SHA="$(git rev-parse --short HEAD)"
            VERSION="0.0.0-dev+${SHORT_SHA}"
          fi

          echo "ZEROLINK_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Resolved release version: ${VERSION}"

      - name: Build frontend
        env:
          VITE_RELEASE_VERIFICATION_REQUIRED: "true"
        run: pnpm --filter @zerolink/frontend build

      - name: Generate manifest
        run: pnpm manifest:generate

      - name: Sign manifest
        env:
          MANIFEST_SIGNING_KEY: ${{ secrets.MANIFEST_SIGNING_KEY }}
        run: pnpm manifest:sign

      - name: Verify manifest
        run: pnpm manifest:verify

      - name: Deploy (production)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: packages/backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Deploy (staging)
        if: "!startsWith(github.ref, 'refs/tags/')"
        working-directory: packages/backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env staging
