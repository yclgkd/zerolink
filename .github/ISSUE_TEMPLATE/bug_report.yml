name: Bug Report
description: Report a bug in ZeroLink
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug!
        **If this is a security vulnerability, DO NOT open an issue.** See [SECURITY.md](https://github.com/yclgkd/ZeroLink/blob/main/SECURITY.md) instead.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Frontend
        - Backend (Cloudflare Workers)
        - Backend (Self-Hosted)
        - Shared Library
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      description: e.g., Chrome 120, Firefox 121, Safari 17.2
      placeholder: Chrome 120

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: macOS 14, Windows 11, Ubuntu 24.04

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, error messages, console logs, etc.
