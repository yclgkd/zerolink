name = "zerolink-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
APP_ENV = "production"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = false

[[durable_objects.bindings]]
name = "SECRET_VAULT"
class_name = "SecretVaultV2"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SecretVault"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SecretVaultProduction"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["SecretVaultV2"]

[[kv_namespaces]]
binding = "SECRETS_KV"
id = "b8313bed33c9492885c12c9d26034420"

# COMMIT_TOKEN_SECRET, RP_ID, and RP_ORIGIN are configured in the Cloudflare Dashboard
# (Workers > Settings > Variables and Secrets). Do NOT add them here or pass via --var.
# These values are environment-specific and must not be committed to git.

[env.staging]
name = "zerolink-api-staging"
main = "src/index.staging.ts"

[env.staging.vars]
APP_ENV = "staging"

[env.staging.observability]
enabled = true
head_sampling_rate = 1

[env.staging.observability.logs]
invocation_logs = true

[[env.staging.durable_objects.bindings]]
name = "SECRET_VAULT"
class_name = "SecretVaultV2"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["SecretVault"]

[[env.staging.migrations]]
tag = "v2"
new_sqlite_classes = ["SecretVaultStaging"]
deleted_classes = ["SecretVault"]

[[env.staging.migrations]]
tag = "v3"
new_sqlite_classes = ["SecretVaultV2"]

[[env.staging.kv_namespaces]]
binding = "SECRETS_KV"
id = "1a3fb3548446479a8f401d8bb54de4c0"

# COMMIT_TOKEN_SECRET, RP_ID, and RP_ORIGIN for staging are configured in the
# Cloudflare Dashboard under Workers > zerolink-api-staging > Settings > Variables and Secrets
