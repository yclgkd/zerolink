# Self-contained local source-build stack.
# Infrastructure services (db, garage) mirror docker-compose.yml — keep in sync.
name: zerolink-selfhost

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 20

  garage:
    image: dxflrs/garage:v2.2.0
    profiles: [storage]
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    volumes:
      - garage-data:/var/lib/garage
      - ./garage.toml:/etc/garage.toml:ro
    expose:
      - "3900"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO /dev/null http://127.0.0.1:3903/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 20

  garage-init:
    image: alpine:3.21
    profiles: [storage]
    env_file:
      - path: .env
        required: true
    depends_on:
      garage:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./garage-init.sh:/init.sh:ro
    restart: "no"

  migrate:
    build:
      context: ../../services/selfhost-api
      dockerfile: ../../deploy/selfhost/api.Dockerfile
    env_file:
      - path: .env
        required: true
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      - selfhost-migrate
    restart: "no"

  api:
    build:
      context: ../../services/selfhost-api
      dockerfile: ../../deploy/selfhost/api.Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8788"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:8788/readyz || exit 1
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: ../..
      dockerfile: deploy/selfhost/frontend.build.Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  garage-data:
