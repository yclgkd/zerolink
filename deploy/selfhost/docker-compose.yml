name: zerolink-selfhost

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    volumes:
      - minio-data:/data
    expose:
      - "9000"
    ports:
      - "9001:9001"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://127.0.0.1:9000/minio/health/ready || exit 1
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: ghcr.io/yclgkd/zerolink-api:${ZEROLINK_IMAGE_TAG:-latest}
    env_file:
      - path: .env
        required: true
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      - selfhost-migrate
    restart: "no"

  api:
    image: ghcr.io/yclgkd/zerolink-api:${ZEROLINK_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8788"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:8788/readyz || exit 1
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    image: ghcr.io/yclgkd/zerolink-web:${ZEROLINK_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  minio-data:
